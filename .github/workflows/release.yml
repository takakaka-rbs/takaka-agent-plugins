name: Release

# main ブランチへのマージ（push）時に実行
on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────
  # ① コミット履歴全体を解析してリポジトリバージョンを決定し
  #    Git タグを打つ
  # ──────────────────────────────────────────────────────
  version-registry:
    name: リポジトリバージョン決定
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 次バージョンを決定してタグを打つ
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # ! 付き type はすべて major up
          major_string_token: "feat!,fix!,refactor!"
          # feat → minor up
          minor_string_token: "feat"
          # fix / perf / refactor → patch up
          patch_string_token: "fix,perf,refactor"
          tag_prefix: "v"
          # conventional commit に該当しない場合はデフォルトで patch up
          default_bump: patch

  # ──────────────────────────────────────────────────────
  # ② バージョンを更新してコミット
  #
  #    レジストリ: marketplace.json の metadata.version を更新
  #    各プラグイン: plugins/<name>/ 配下を変更したコミットだけを
  #                見て個別に semver バンプ（最大変更を優先）
  #
  #    バンプ判定ルール（プラグイン単位）:
  #      feat! / fix! / refactor! / BREAKING CHANGE → major
  #      feat                                        → minor
  #      fix / perf / refactor                       → patch
  #      docs / style / test / build / ci / chore    → 変動なし
  # ──────────────────────────────────────────────────────
  update-versions:
    name: バージョン更新（レジストリ + 各プラグイン）
    runs-on: ubuntu-latest
    needs: version-registry
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 各プラグインのバージョンをコミット履歴から判定して更新
        run: |
          REGISTRY_VERSION="${{ needs.version-registry.outputs.version }}"

          # semver バンプ関数
          bump_semver() {
            local v=$1 bump=$2
            local major minor patch
            IFS='.' read -r major minor patch <<< "$v"
            case $bump in
              major) echo "$((major+1)).0.0" ;;
              minor) echo "$major.$((minor+1)).0" ;;
              patch) echo "$major.$minor.$((patch+1))" ;;
              *)     echo "$v" ;;
            esac
          }

          # 直前タグを取得（タグがなければ初回コミットを起点にする）
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null \
                     || git rev-list --max-parents=0 HEAD)

          echo "前回タグ / 起点: $LAST_TAG"

          # plugins/ 配下の各プラグインを走査
          for PLUGIN_DIR in plugins/*/; do
            PLUGIN=$(basename "$PLUGIN_DIR")
            PLUGIN_JSON="plugins/$PLUGIN/plugin.json"
            [ -f "$PLUGIN_JSON" ] || continue

            # このプラグインに影響するコミットメッセージを取得
            COMMITS=$(git log --format="%s" "${LAST_TAG}..HEAD" -- "plugins/$PLUGIN/" 2>/dev/null)
            [ -z "$COMMITS" ] && continue

            # バンプ種別を判定（最も大きい変更を優先）
            if echo "$COMMITS" | grep -qE "(feat|fix|refactor)!|BREAKING.CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?[!:]"; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\([^)]*\))?:"; then
              BUMP="patch"
            else
              # docs / style / test / build / ci / chore → バージョン変動なし
              echo "Plugin $PLUGIN: 変動なし（スキップ）"
              continue
            fi

            # 現在バージョンを取得してバンプ
            CURRENT=$(jq -r '.version // "0.0.0"' "$PLUGIN_JSON")
            NEW_VER=$(bump_semver "$CURRENT" "$BUMP")

            echo "Plugin $PLUGIN: $CURRENT → $NEW_VER ($BUMP)"

            # plugin.json を更新
            jq --arg v "$NEW_VER" '.version = $v' "$PLUGIN_JSON" > tmp.json
            mv tmp.json "$PLUGIN_JSON"

            # marketplace.json の対応エントリも更新
            jq --arg n "$PLUGIN" --arg v "$NEW_VER" \
              '(.plugins[] | select(.name == $n) | .version) |= $v' \
              .claude-plugin/marketplace.json > tmp.json
            mv tmp.json .claude-plugin/marketplace.json
          done

          # marketplace.json のレジストリバージョンを更新
          jq --arg v "$REGISTRY_VERSION" '.metadata.version = $v' \
            .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'plugins/*/plugin.json' .claude-plugin/marketplace.json
          # 差分がなければスキップ（冪等）
          git diff --cached --quiet \
            || git commit -m "chore: バージョン更新 v${{ needs.version-registry.outputs.version }} [skip ci]"
          git push

  # ──────────────────────────────────────────────────────
  # ③ GitHub Release を作成
  #    リリースノートはコミット履歴から自動生成
  # ──────────────────────────────────────────────────────
  create-release:
    name: GitHub Release 作成
    runs-on: ubuntu-latest
    needs:
      - version-registry
      - update-versions
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Release を作成
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.version-registry.outputs.version }}
          name: v${{ needs.version-registry.outputs.version }}
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
