name: Release

# main ブランチへのマージ（push）時に実行
on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────
  # ① コミット履歴を解析してバージョンを決定し Git タグを打つ
  # ──────────────────────────────────────────
  versioning:
    name: バージョン決定
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 次バージョンを決定してタグを打つ
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # ! 付き type はすべて major up
          major_string_token: "feat!,fix!,refactor!"
          # feat → minor up
          minor_string_token: "feat"
          # fix / perf / refactor → patch up
          patch_string_token: "fix,perf,refactor"
          tag_prefix: "v"
          # conventional commit に該当しない場合はデフォルトで patch up
          default_bump: patch

  # ──────────────────────────────────────────
  # ② .claude-plugin/marketplace.json の version を更新してコミット
  # ──────────────────────────────────────────
  update-marketplace:
    name: marketplace.json バージョン更新
    runs-on: ubuntu-latest
    needs: versioning
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # タグ打ち後の最新 main を取得
          ref: main
          fetch-depth: 1

      - name: marketplace.json の version フィールドを更新
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          # 差分がなければスキップ（冪等）
          git diff --cached --quiet \
            || git commit -m "chore: marketplace v${{ needs.versioning.outputs.version }} [skip ci]"
          git push

  # ──────────────────────────────────────────
  # ③ GitHub Release を作成（リリースノートはコミット履歴から自動生成）
  # ──────────────────────────────────────────
  create-release:
    name: GitHub Release 作成
    runs-on: ubuntu-latest
    needs:
      - versioning
      - update-marketplace
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Release を作成
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.versioning.outputs.version }}
          name: v${{ needs.versioning.outputs.version }}
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
